# Docker embedded DNS — re-resolve upstreams when containers are recreated
resolver 127.0.0.11 valid=10s ipv6=off;

# 统一入口：公网 IP / 域名均可同时访问
#   /           → Student
#   /admin/     → Admin
#   /api/       → API
#   /static/    → API 静态资源
#   /db/        → 已关闭（phpMyAdmin 默认不对外暴露）
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 64m;

    # Use variables in proxy_pass so nginx re-resolves via the resolver above
    # (static "upstream { server name:port }" is resolved only at nginx start).

    location /api/ {
        set $upstream_api rmmt-api:5000;
        proxy_pass http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Refresh-Access-Token;
    }

    location /static/ {
        set $upstream_api rmmt-api:5000;
        proxy_pass http://$upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        set $upstream_admin rmmt-admin:80;
        proxy_pass http://$upstream_admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # phpMyAdmin 不对外暴露；需要时用 profile 本地启，勿挂公网路径
    location = /db {
        return 404;
    }

    location /db/ {
        return 404;
    }

    location / {
        set $upstream_student rmmt-student:80;
        proxy_pass http://$upstream_student;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
