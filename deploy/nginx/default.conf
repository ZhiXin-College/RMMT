upstream rmmt_student {
    server rmmt-student:80;
}

upstream rmmt_admin {
    server rmmt-admin:80;
}

upstream rmmt_api {
    server rmmt-api:5000;
}

# 统一入口：公网 IP / 域名均可同时访问
#   /           → Student
#   /admin/     → Admin
#   /api/       → API
#   /static/    → API 静态资源
#   /db/        → 已关闭（phpMyAdmin 默认不对外暴露）
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 64m;

    location /api/ {
        proxy_pass http://rmmt_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Refresh-Access-Token;
    }

    location /static/ {
        proxy_pass http://rmmt_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://rmmt_admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # phpMyAdmin 不对外暴露；需要时用 profile 本地启，勿挂公网路径
    location = /db {
        return 404;
    }

    location /db/ {
        return 404;
    }

    location / {
        proxy_pass http://rmmt_student;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
